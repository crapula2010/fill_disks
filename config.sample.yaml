# Main source folders (supports local paths and SMB URLs).
# Use smb:// for Android compatibility, or local paths for mounted folders.
sources:
  - "smb://192.168.68.57/pauli/everyone/music"

# Real filesystem mount paths on Android, not UI labels.
# Replace these with your actual SD card mount points.
# Each target can optionally specify its own reserve_mb to override the global value.
# The order of targets matters: when deduplicating, earlier targets are KEPT and later ones are deleted.
# So put your preferred storage first (e.g., internal storage should come first).
targets:
  - path: "/storage/emulated/0/Music"  # Internal storage (kept in dedup)
    reserve_mb: 10000
  - path: "/storage/external_sd1/Music"
  - path: "/storage/external_sd2/Music"

# Runtime options. CLI flags override these values.
options:
  reserve_mb: 256
  auto_detect_targets: true
  execute: false
  allow_internal: true
  overwrite: false
  verbose: true
  plan_output: "plan.jsonl"
  # seed: 12345
  # max_files: 1000

# SMB credentials are optional here.
# You can also set SMB_USERNAME / SMB_PASSWORD / SMB_DOMAIN env vars.
smb:
  username: ""
  password: ""
  domain: ""
